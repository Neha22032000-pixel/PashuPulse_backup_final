name: Import PashuPulse

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/import-pashupulse.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source repository
        run: |
          curl -L https://github.com/Rishavutkarsh/PashuPulse/archive/refs/heads/main.zip -o /tmp/pashupulse-main.zip
          unzip -q /tmp/pashupulse-main.zip -d /tmp/pashupulse-src

      - name: Replace repository contents
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a /tmp/pashupulse-src/PashuPulse-main/ ./
          rm -f .github/workflows/import-pashupulse.yml

      - name: Commit imported code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Import PashuPulse codebase"
            git push origin main
          fi

# Triggered once by Codex to import the source repository.
